<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HS - Gestão & Orçamentos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #004a8d; --accent: #ff9800; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { max-width: 950px; margin: 0 auto; padding: 15px; }
        
        /* UI Estilo */
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e0e0e0; }
        h1, h2 { color: var(--primary); text-align: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; font-size: 16px; }
        .btn-accent { background: var(--accent); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-container input { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-search { width: auto; padding: 0 20px; }

        label { display: block; font-weight: bold; color: var(--primary); margin-top: 10px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .screen { display: none; }
        .active { display: block; }

        .list-item { background: #fff; border-left: 5px solid var(--primary); padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .os-badge { background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }

        .mat-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }

        /* --- CORREÇÃO CRÍTICA DO PDF --- */
        #print-area { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
        }
        .pdf-content { 
            width: 210mm; 
            height: 297mm; 
            padding: 10mm 15mm; 
            background: white; 
            color: black; 
            font-family: Arial, sans-serif; 
            box-sizing: border-box;
            display: block;
        }
        .pdf-header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; padding: 0; }
        .pdf-header h1 { margin: 0; font-size: 26pt; color: #004a8d; font-weight: bold; padding: 0; line-height: 1.2; }
        .pdf-header p { margin: 5px 0; font-size: 12pt; font-weight: bold; text-transform: uppercase; color: #333; }
        
        .pdf-info { display: flex; flex-wrap: wrap; font-size: 11pt; border-bottom: 1px solid #000; padding: 10px 0; margin-bottom: 15px; }
        .pdf-info div { width: 50%; margin-bottom: 5px; }

        .pdf-body { display: flex; justify-content: space-between; gap: 20px; font-size: 10pt; line-height: 1.4; }
        .pdf-col-left { width: 62%; }
        .pdf-col-right { width: 36%; }
        
        .pdf-section-title { font-weight: bold; text-transform: uppercase; margin-top: 15px; margin-bottom: 5px; font-size: 11pt; border-bottom: 1px solid #ccc; }
        .pdf-body ul { padding-left: 18px; margin: 0; list-style-type: disc; }
        .pdf-body li { margin-bottom: 5px; }

        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 10pt; }
        .pdf-table th, .pdf-table td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .pdf-table th { background: #333; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-home" class="screen active">
        <h1>HS - GESTÃO & ORÇAMENTOS</h1>
        <div class="card search-container">
            <input type="text" id="main-search" placeholder="Pesquisar cliente ou OS...">
            <button class="btn btn-search" onclick="filterClients()">Pesquisar</button>
        </div>
        <button class="btn" onclick="openNewOS()">+ Criar Nova Ordem de Serviço</button>
        <div id="client-list-container"></div>
    </div>

    <div id="screen-os-form" class="screen card">
        <h2 id="form-title">Nova Ordem de Serviço</h2>
        <div style="text-align: right;"><span class="os-badge">OS Nº: <span id="os-number-display">0000</span></span></div>
        
        <label>Cliente</label><input type="text" id="f-cliente">
        <label>Endereço</label><input type="text" id="f-endereco">
        <label>Data</label><input type="date" id="f-data-os">
        
        <label>Tipo de Documento</label>
        <select id="f-tipo" onchange="toggleFormFields()">
            <option value="orcamento">Proposta de Orçamento</option>
            <option value="lista">Lista de Materiais</option>
        </select>

        <div id="fields-orcamento">
            <label>Escopo do Trabalho</label><textarea id="f-escopo" rows="6"></textarea>
            <label>Diferencial e Garantia</label><textarea id="f-garantia" rows="3"></textarea>
            <label>Valor da Mão de Obra (R$)</label><input type="number" id="f-mao-obra">
            <label>Valor Total da Empreitada (Materiais + Mão de Obra) (R$)</label><input type="number" id="f-empreitada">
        </div>

        <div id="fields-lista" style="display:none;">
            <div id="mat-container"></div>
            <button class="btn btn-outline" onclick="addMaterialRow()">+ Adicionar Item</button>
        </div>

        <button class="btn" onclick="saveData()">💾 Salvar no iPhone</button>
        <button class="btn btn-accent" id="btn-pdf" style="display:none;" onclick="exportPDF()">📄 Gerar PDF Profissional</button>
        <button class="btn btn-outline" onclick="showScreen('screen-home')">Voltar</button>
    </div>
</div>

<div id="print-area">
    <div id="pdf-template" class="pdf-content">
        <div class="pdf-header">
            <h1>HS MANUTENÇÃO ELÉTRICA</h1>
            <p id="pdf-tipo-txt">PROPOSTA DE SERVIÇO DE MANUTENÇÃO E INSTALAÇÃO ELÉTRICA ESPECIALIZADA</p>
        </div>
        <div class="pdf-info">
            <div><strong>Cliente:</strong> <span id="p-cliente"></span></div>
            <div><strong>Data:</strong> <span id="p-data"></span></div>
            <div><strong>Endereço:</strong> <span id="p-endereco"></span></div>
            <div><strong>OS Nº:</strong> <span id="p-os-num"></span></div>
        </div>
        <div id="p-corpo"></div>
        <div style="margin-top: 30px; font-size: 10pt; line-height: 1.5;">
            Agradecemos a oportunidade e ficamos à disposição para esclarecimentos.<br>
            Atenciosamente, <strong>Higor Servelo</strong>.
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('hs_database')) || { lastOS: 1000, entries: [] };
    let currentId = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-home') renderList();
    }

    function openNewOS() {
        currentId = null;
        document.getElementById('os-number-display').innerText = db.lastOS + 1;
        document.getElementById('f-data-os').valueAsDate = new Date();
        document.getElementById('btn-pdf').style.display = 'none';
        document.getElementById('f-cliente').value = '';
        document.getElementById('f-endereco').value = '';
        document.getElementById('f-escopo').value = '';
        document.getElementById('f-garantia').value = '';
        document.getElementById('f-mao-obra').value = '';
        document.getElementById('f-empreitada').value = '';
        document.getElementById('mat-container').innerHTML = '';
        addMaterialRow();
        showScreen('screen-os-form');
    }

    function toggleFormFields() {
        const tipo = document.getElementById('f-tipo').value;
        document.getElementById('fields-orcamento').style.display = tipo === 'orcamento' ? 'block' : 'none';
        document.getElementById('fields-lista').style.display = tipo === 'lista' ? 'block' : 'none';
    }

    function addMaterialRow() {
        const div = document.createElement('div');
        div.className = 'mat-grid';
        div.innerHTML = `<input type="text" placeholder="Material" class="m-d"><input type="number" placeholder="Qtd" class="m-q"><input type="number" placeholder="V.U" class="m-v">`;
        document.getElementById('mat-container').appendChild(div);
    }

    function saveData() {
        const dataVal = document.getElementById('f-data-os').value;
        const entry = {
            id: currentId || Date.now(),
            osNum: currentId ? document.getElementById('os-number-display').innerText : ++db.lastOS,
            cliente: document.getElementById('f-cliente').value,
            endereco: document.getElementById('f-endereco').value,
            data: dataVal.split('-').reverse().join('/'),
            dataRaw: dataVal,
            tipo: document.getElementById('f-tipo').value,
            escopo: document.getElementById('f-escopo').value,
            garantia: document.getElementById('f-garantia').value,
            maoObra: document.getElementById('f-mao-obra').value,
            empreitada: document.getElementById('f-empreitada').value,
            materiais: Array.from(document.querySelectorAll('.mat-grid')).map(row => ({
                d: row.querySelector('.m-d').value,
                q: row.querySelector('.m-q').value,
                v: row.querySelector('.m-v').value
            })).filter(m => m.d)
        };
        if(currentId) db.entries = db.entries.map(e => e.id === currentId ? entry : e);
        else db.entries.push(entry);
        localStorage.setItem('hs_database', JSON.stringify(db));
        alert("Salvo com sucesso!");
        showScreen('screen-home');
    }

    function renderList(filter = '') {
        const container = document.getElementById('client-list-container');
        container.innerHTML = '';
        db.entries.filter(e => e.cliente.toLowerCase().includes(filter.toLowerCase()) || e.osNum.toString().includes(filter))
        .reverse().forEach(e => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.onclick = () => editEntry(e);
            div.innerHTML = `<div><strong>${e.cliente}</strong><br><small>${e.tipo.toUpperCase()} - ${e.data}</small></div><span class="os-badge">OS ${e.osNum}</span>`;
            container.appendChild(div);
        });
    }

    function filterClients() { renderList(document.getElementById('main-search').value); }

    function editEntry(e) {
        currentId = e.id;
        document.getElementById('os-number-display').innerText = e.osNum;
        document.getElementById('f-cliente').value = e.cliente;
        document.getElementById('f-endereco').value = e.endereco;
        document.getElementById('f-data-os').value = e.dataRaw;
        document.getElementById('f-tipo').value = e.tipo;
        document.getElementById('f-escopo').value = e.escopo;
        document.getElementById('f-garantia').value = e.garantia;
        document.getElementById('f-mao-obra').value = e.maoObra;
        document.getElementById('f-empreitada').value = e.empreitada;
        const mc = document.getElementById('mat-container'); mc.innerHTML = '';
        e.materiais.forEach(m => {
            const div = document.createElement('div'); div.className = 'mat-grid';
            div.innerHTML = `<input type="text" value="${m.d}" class="m-d"><input type="number" value="${m.q}" class="m-q"><input type="number" value="${m.v}" class="m-v">`;
            mc.appendChild(div);
        });
        if(e.materiais.length === 0) addMaterialRow();
        toggleFormFields();
        document.getElementById('btn-pdf').style.display = 'block';
        showScreen('screen-os-form');
    }

    function exportPDF() {
        const e = db.entries.find(entry => entry.id === currentId);
        document.getElementById('p-cliente').innerText = e.cliente;
        document.getElementById('p-data').innerText = e.data;
        document.getElementById('p-endereco').innerText = e.endereco;
        document.getElementById('p-os-num').innerText = e.osNum;

        let htmlContent = '';
        if(e.tipo === 'orcamento') {
            document.getElementById('pdf-tipo-txt').innerText = "PROPOSTA DE SERVIÇO DE MANUTENÇÃO E INSTALAÇÃO ELÉTRICA ESPECIALIZADA";
            const escopo = e.escopo.split('\n').filter(l => l.trim() !== '').map(l => `<li>${l}</li>`).join('');
            const garantia = e.garantia.split('\n').filter(l => l.trim() !== '').map(l => `<li>${l}</li>`).join('');
            const vMo = parseFloat(e.maoObra || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2});
            const vEm = parseFloat(e.empreitada || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2});

            htmlContent = `
            <div class="pdf-body">
                <div class="pdf-col-left">
                    <div class="pdf-section-title">Escopo do Trabalho:</div><ul>${escopo}</ul>
                    <div class="pdf-section-title">Responsável Técnico:</div><ul><li>Nome do Responsável: <strong>Higor Servelo</strong></li></ul>
                </div>
                <div class="pdf-col-right">
                    <div class="pdf-section-title">Diferencial e Garantia:</div><ul>${garantia}</ul>
                    <div class="pdf-section-title">Investimento:</div>
                    <ul style="list-style:none; padding:0;">
                        <li><strong>Valor da mão de obra: R$ ${vMo}</strong></li>
                        <li style="margin-top:10px;">Nota: Valor referente à mão de obra. O custo total de <strong>empreitada</strong> (materiais e mão de obra) é de <strong>R$ ${vEm}</strong>.</li>
                        <li style="margin-top:10px;">Pagamento: 50% de sinal e 50% na entrega.</li>
                    </ul>
                </div>
            </div>`;
        } else {
            document.getElementById('pdf-tipo-txt').innerText = "LISTA DE MATERIAIS ELÉTRICOS - ATUALIZADA";
            let rows = '', total = 0;
            e.materiais.forEach(m => { 
                let sub = m.q * m.v; total += sub;
                rows += `<tr><td>${m.d}</td><td>${m.q} unid.</td><td>R$ ${parseFloat(m.v).toFixed(2).replace('.',',')}</td><td>R$ ${sub.toFixed(2).replace('.',',')}</td></tr>`;
            });
            htmlContent = `<table class="pdf-table"><thead><tr><th>Descrição do Material</th><th>Qtd</th><th>Unit.</th><th>Total</th></tr></thead><tbody>${rows}</tbody><tfoot><tr style="font-weight:bold;"><td colspan="3" style="text-align:right">TOTAL ESTIMADO</td><td>R$ ${total.toFixed(2).replace('.',',')}</td></tr></tfoot></table>`;
        }
        document.getElementById('p-corpo').innerHTML = htmlContent;
        
        // --- CONFIGURAÇÃO DE RENDERIZAÇÃO BLINDADA ---
        const element = document.getElementById('pdf-template');
        const opt = { 
            margin: 0, 
            filename: `OS_${e.osNum}.pdf`, 
            image: { type: 'jpeg', quality: 0.98 }, 
            html2canvas: { scale: 3, useCORS: true, letterRendering: true, y: 0, scrollY: 0 }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
        };
        
        html2pdf().from(element).set(opt).save();
    }
    renderList();
</script>
</body>
</html>
