<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HS - Gestão & Orçamentos</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #004a8d; --accent: #ff9800; --bg: #f4f7f6; --text: #333; --danger: #d9534f; --success: #28a745; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { max-width: 950px; margin: 0 auto; padding: 15px; }
        
        .app-header { text-align: center; margin-bottom: 20px; }
        .app-header img { max-height: 70px; margin-bottom: 10px; border-radius: 8px; }
        .app-header h1 { margin: 0; font-size: 24px; color: var(--primary); }

        .nav-container { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .nav-btn { flex: 1; min-width: 85px; background: #e0e0e0; color: var(--primary); border: none; padding: 12px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; white-space: nowrap; }
        .nav-btn:hover, .nav-btn.active-nav { background: var(--primary); color: white; }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e0e0e0; }
        h2, h3 { color: var(--primary); text-align: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; font-size: 16px; }
        .btn-accent { background: var(--accent); }
        .btn-danger { background: var(--danger); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        label { font-weight: bold; color: var(--primary); display: block; margin-top: 10px; }

        .screen { display: none; }
        .active { display: block; }

        .list-item { background: #fff; border-left: 5px solid var(--primary); padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .os-badge { background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        .mat-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }

        /* FINANCEIRO */
        .fin-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .fin-card { padding: 15px; border-radius: 10px; text-align: center; color: white; }
        .bg-ganho { background: var(--success); }
        .bg-pendente { background: var(--accent); }
        .chart-container { height: 200px; margin-bottom: 20px; }

        /* PDF - FIX: REMOVIDO ESPAÇAMENTO EXCESSIVO */
        #print-area { position: absolute; left: -9999px; top: 0; }
        .pdf-content { width: 190mm; margin: 0; padding: 10mm; background: white; color: black; font-family: Arial, sans-serif; }
        .pdf-header { text-align: center; border-bottom: 2px solid #004a8d; margin-bottom: 15px; padding-bottom: 10px; }
        .pdf-header img { max-height: 70px; display: block; margin: 0 auto 5px; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .pdf-table th { background: #f2f2f2; border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 12px; }
        .pdf-table td { border: 1px solid #ccc; padding: 8px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <img src="logo.png" alt="Logomarca HS" onerror="this.style.display='none'">
        <h1>HS - GESTÃO & ORÇAMENTOS</h1>
    </div>

    <div class="nav-container">
        <button id="nav-home" class="nav-btn active-nav" onclick="showScreen('screen-home')">Início</button>
        <button id="nav-clientes" class="nav-btn" onclick="showScreen('screen-clientes')">Clientes</button>
        <button id="nav-os" class="nav-btn" onclick="showScreen('screen-os-list')">OS</button>
        <button id="nav-orcamentos" class="nav-btn" onclick="showScreen('screen-orcamentos')">Orçamentos</button>
        <button id="nav-financeiro" class="nav-btn" onclick="showScreen('screen-financeiro')">Financeiro</button>
    </div>

    <div id="screen-home" class="screen active">
        <button class="btn" onclick="openNewOS()">+ Criar Nova Ordem de Serviço</button>
        <h3>Recentes</h3>
        <div id="home-list-container"></div>
    </div>

    <div id="screen-financeiro" class="screen">
        <div class="fin-summary">
            <div class="fin-card bg-ganho"><small>Recebido</small><br><strong id="fin-total-pago">R$ 0,00</strong></div>
            <div class="fin-card bg-pendente"><small>Pendente</small><br><strong id="fin-total-pendente">R$ 0,00</strong></div>
        </div>
        <div class="card">
            <h3>Balanço</h3>
            <div class="chart-container"><canvas id="chartLucro"></canvas></div>
        </div>
        <div class="card">
            <h3>Registrar Gasto</h3>
            <input type="file" accept="image/*" capture="camera" id="f-nota-foto">
            <select id="f-nota-cat">
                <option value="Combustível">⛽ Combustível</option>
                <option value="Refeição">🍽️ Refeição</option>
                <option value="Material">🛠️ Material</option>
            </select>
            <input type="number" id="f-nota-valor" placeholder="Valor R$">
            <button class="btn btn-danger" onclick="addGasto()">Salvar Custo</button>
        </div>
    </div>

    <div id="screen-clientes" class="screen card">
        <h2>Meus Clientes</h2>
        <div id="list-clientes-container"></div>
    </div>

    <div id="screen-os-list" class="screen card">
        <h2>Todas as OS</h2>
        <div id="list-todas-os-container"></div>
    </div>

    <div id="screen-orcamentos" class="screen card">
        <h2>Orçamentos Salvos</h2>
        <div id="list-orcamentos-container"></div>
    </div>

    <div id="screen-os-form" class="screen card">
        <h2 id="form-title">Editar Documento</h2>
        <div style="text-align: right;"><span class="os-badge">OS Nº: <span id="os-number-display">0000</span></span></div>
        
        <label>Status Financeiro</label>
        <select id="f-pago">
            <option value="nao">Pendente</option>
            <option value="sim">Pago</option>
        </select>

        <label>Cliente</label><input type="text" id="f-cliente">
        <label>Endereço</label><input type="text" id="f-endereco">
        <label>Data</label><input type="date" id="f-data-os">
        
        <label>Tipo</label>
        <select id="f-tipo" onchange="toggleFormFields()">
            <option value="orcamento">Proposta de Orçamento</option>
            <option value="lista">Lista de Materiais</option>
        </select>

        <div id="fields-orcamento">
            <label>Escopo</label><textarea id="f-escopo" rows="8"></textarea>
            <label>Mão de Obra (R$)</label><input type="number" id="f-mao-obra">
            <label>Empreitada Total (R$)</label><input type="number" id="f-empreitada">
        </div>

        <div id="fields-lista" style="display:none;">
            <div id="mat-container"></div>
            <button class="btn btn-outline" onclick="addMaterialRow()">+ Adicionar Item</button>
        </div>

        <button class="btn" onclick="saveData()">💾 Salvar Alterações</button>
        <button class="btn btn-accent" id="btn-pdf" style="display:none;" onclick="exportPDF()">📄 Gerar PDF</button>
        <button class="btn btn-outline" onclick="showScreen('screen-home')">Voltar</button>
    </div>
</div>

<div id="print-area">
    <div id="pdf-template" class="pdf-content">
        <div class="pdf-header">
            <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
            <h1 style="color:#004a8d; margin:0; font-size: 18pt;">HS MANUTENÇÃO ELÉTRICA</h1>
            <p style="margin:2px 0; font-size: 10pt; font-weight: bold;">PROPOSTA DE SERVIÇO DE MANUTENÇÃO E INSTALAÇÃO</p>
        </div>
        <div id="p-corpo"></div>
        <div style="margin-top: 20px; text-align: center; font-size: 10pt;">
            <p>Atenciosamente, <strong>Higor Servelo</strong></p>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('hs_database')) || { lastOS: 1000, entries: [], gastos: [] };
    let chartL = null, currentId = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(id).classList.add('active');
        const navId = 'nav-' + id.replace('screen-', '');
        if(document.getElementById(navId)) document.getElementById(navId).classList.add('active-nav');
        if(id === 'screen-home') renderHome();
        if(id === 'screen-financeiro') renderFinanceiro();
        if(id === 'screen-os-list') renderAllOS();
        if(id === 'screen-orcamentos') renderOrcamentos();
        if(id === 'screen-clientes') renderClientes();
    }

    function renderHome() {
        const c = document.getElementById('home-list-container');
        c.innerHTML = db.entries.slice().reverse().slice(0, 5).map(e => `
            <div class="list-item" onclick="editEntry(${e.id})">
                <div><strong>${e.cliente}</strong><br><small>OS ${e.osNum}</small></div>
                <span class="os-badge">${e.fPago === 'sim' ? 'PAGO' : 'ABERTO'}</span>
            </div>`).join('');
    }

    function toggleFormFields() {
        const t = document.getElementById('f-tipo').value;
        document.getElementById('fields-orcamento').style.display = t === 'orcamento' ? 'block' : 'none';
        document.getElementById('fields-lista').style.display = t === 'lista' ? 'block' : 'none';
    }

    function addMaterialRow(d='', q='', v='') {
        const div = document.createElement('div'); div.className = 'mat-grid';
        div.innerHTML = `<input type="text" placeholder="Item" class="m-d" value="${d}"><input type="number" placeholder="Qtd" class="m-q" value="${q}"><input type="number" placeholder="V.U" class="m-v" value="${v}">`;
        document.getElementById('mat-container').appendChild(div);
    }

    function saveData() {
        const entry = {
            id: currentId || Date.now(),
            osNum: currentId ? parseInt(document.getElementById('os-number-display').innerText) : ++db.lastOS,
            cliente: document.getElementById('f-cliente').value, endereco: document.getElementById('f-endereco').value,
            data: document.getElementById('f-data-os').value, tipo: document.getElementById('f-tipo').value,
            maoObra: document.getElementById('f-mao-obra').value, empreitada: document.getElementById('f-empreitada').value,
            escopo: document.getElementById('f-escopo').value, fPago: document.getElementById('f-pago').value,
            materiais: Array.from(document.querySelectorAll('.mat-grid')).map(row => ({ d: row.querySelector('.m-d').value, q: row.querySelector('.m-q').value, v: row.querySelector('.m-v').value })).filter(m => m.d)
        };
        if(currentId) db.entries = db.entries.map(e => e.id === currentId ? entry : e); else db.entries.push(entry);
        localStorage.setItem('hs_database', JSON.stringify(db));
        showScreen('screen-home');
    }

    function editEntry(id) {
        const e = db.entries.find(en => en.id === id); currentId = e.id;
        document.getElementById('os-number-display').innerText = e.osNum;
        document.getElementById('f-cliente').value = e.cliente;
        document.getElementById('f-endereco').value = e.endereco || '';
        document.getElementById('f-data-os').value = e.data || '';
        document.getElementById('f-mao-obra').value = e.maoObra || '';
        document.getElementById('f-empreitada').value = e.empreitada || '';
        document.getElementById('f-escopo').value = e.escopo || '';
        document.getElementById('f-pago').value = e.fPago || 'nao';
        document.getElementById('f-tipo').value = e.tipo || 'orcamento';
        document.getElementById('mat-container').innerHTML = '';
        if(e.materiais && e.materiais.length) e.materiais.forEach(m => addMaterialRow(m.d, m.q, m.v)); else addMaterialRow();
        document.getElementById('btn-pdf').style.display = 'block'; toggleFormFields(); showScreen('screen-os-form');
    }

    function exportPDF() {
        const e = db.entries.find(en => en.id === currentId);
        let html = `<div style="font-size: 10pt; margin-bottom: 10px;">
                    <strong>Cliente:</strong> ${e.cliente} <span style="float:right;"><strong>Data:</strong> ${e.data}</span><br>
                    <strong>Endereço:</strong> ${e.endereco || '---'} <span style="float:right;"><strong>OS Nº:</strong> ${e.osNum}</span>
                    </div><hr style="border: 0; border-top: 1px solid #ccc;">`;
        
        if(e.tipo === 'orcamento') {
            html += `<p><strong>ESCOPO DO TRABALHO:</strong></p><p style="white-space: pre-wrap; font-size: 11pt;">${e.escopo}</p>
                     <div style="margin-top: 20px; background: #f9f9f9; padding: 10px; border-radius: 5px;">
                     <strong>INVESTIMENTO:</strong><br>
                     Valor da mão de obra: <strong>R$ ${parseFloat(e.maoObra || 0).toFixed(2)}</strong><br>
                     <small>Custo total de empreitada (materiais + mão de obra): R$ ${parseFloat(e.empreitada || 0).toFixed(2)}</small>
                     </div>`;
        } else {
            html += `<p><strong>LISTA DE MATERIAIS:</strong></p><table class="pdf-table"><tr><th>Item</th><th>Qtd</th><th>Unitário</th></tr>`;
            e.materiais.forEach(m => { html += `<tr><td>${m.d}</td><td>${m.q}</td><td>R$ ${parseFloat(m.v || 0).toFixed(2)}</td></tr>`; });
            html += `</table>`;
        }
        document.getElementById('p-corpo').innerHTML = html;
        const opt = { margin: 0, filename: `HS_OS_${e.osNum}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, y: 0 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(document.getElementById('pdf-template')).save();
    }

    function addGasto() {
        const v = parseFloat(document.getElementById('f-nota-valor').value);
        if(!v) return;
        db.gastos.push({ cat: document.getElementById('f-nota-cat').value, val: v, data: new Date().toLocaleDateString() });
        localStorage.setItem('hs_database', JSON.stringify(db));
        document.getElementById('f-nota-valor').value = ''; renderFinanceiro();
    }

    function renderFinanceiro() {
        let rec = 0, pen = 0, cust = 0;
        db.entries.forEach(e => { let v = parseFloat(e.maoObra || 0); if(e.fPago === 'sim') rec += v; else pen += v; });
        db.gastos.forEach(g => cust += g.val);
        document.getElementById('fin-total-pago').innerText = `R$ ${rec.toLocaleString('pt-BR')}`;
        document.getElementById('fin-total-pendente').innerText = `R$ ${pen.toLocaleString('pt-BR')}`;
        if(chartL) chartL.destroy();
        chartL = new Chart(document.getElementById('chartLucro'), { type: 'bar', data: { labels: ['Ganhos', 'Custos'], datasets: [{ data: [rec, cust], backgroundColor: ['#28a745', '#d9534f'] }] }, options: { maintainAspectRatio: false } });
    }

    function openNewOS() { currentId = null; document.getElementById('os-number-display').innerText = db.lastOS + 1; document.getElementById('f-cliente').value = ''; document.getElementById('mat-container').innerHTML = ''; addMaterialRow(); showScreen('screen-os-form'); }
    function renderAllOS() { document.getElementById('list-todas-os-container').innerHTML = db.entries.slice().reverse().map(e => `<div class="list-item" onclick="editEntry(${e.id})"><div><strong>${e.cliente}</strong><br><small>OS ${e.osNum}</small></div><span>${e.data}</span></div>`).join(''); }
    function renderOrcamentos() { document.getElementById('list-orcamentos-container').innerHTML = db.entries.filter(e => e.tipo === 'orcamento').reverse().map(e => `<div class="list-item" onclick="editEntry(${e.id})"><div><strong>${e.cliente}</strong><br><small>R$ ${e.maoObra}</small></div><span class="os-badge">OS ${e.osNum}</span></div>`).join(''); }
    function renderClientes() { const cli = [...new Set(db.entries.map(e => e.cliente))]; document.getElementById('list-clientes-container').innerHTML = cli.map(c => `<div class="list-item"><strong>${c}</strong></div>`).join(''); }

    showScreen('screen-home');
</script>
</body>
</html>
